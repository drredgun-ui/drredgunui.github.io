<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hii</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  color:white;
  font-family:Arial;
}

h1{
  font-size:4rem;
}
</style>
</head>

<body>

<h1>Hii 👋</h1>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzv1ytnwlGnBxDr6USi5vviFBFaNAvqV2VExk9TI0LNSq3loB_eUCfOxESZan21i_81/exec";

async function sendVisitor() {

  try {

    const response = await fetch("https://ipapi.co/json/");
    const loc = await response.json();

    const data = {
      device: /Mobi|Android/i.test(navigator.userAgent)
        ? "Mobile"
        : "Desktop",

      browser: navigator.userAgent,

      os: navigator.platform,

      screen: screen.width + "x" + screen.height,

      ip: loc.ip || "",

      city: loc.city || "",

      region: loc.region || "",

      country: loc.country_name || "",

      userAgent: navigator.userAgent
    };

    const result = await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    console.log(await result.text());

  } catch(err) {

    console.log(err);

  }

}

sendVisitor();

</script>

</body>
</html>
